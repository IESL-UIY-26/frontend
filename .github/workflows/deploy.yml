name: Deploy React App to FTP

on:
  push:
    branches:
      - main  # Runs on push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18  # Use the correct Node.js version for your project

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}  # FTP Server (e.g., ftp.example.com)
          username: ${{ secrets.FTP_USER }}  # FTP Username
          password: ${{ secrets.FTP_PASSWORD }}  # FTP Password
          local-dir: dist/  # Folder to upload
          server-dir: /  # Destination path on the FTP server
